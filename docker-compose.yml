version: '3.8'

services:
  # 主服务 - CLI 交互模式
  agent:
    build: .
    container_name: controllable-agent
    env_file:
      - .env
    volumes:
      - ./app/config/agent.yaml:/app/app/config/agent.yaml:ro
      - agent-memory:/root/.agent-memory
    stdin_open: true
    tty: true
    # 启动命令
    command: python -m app.cli

  # REST API 服务
  api:
    build: .
    container_name: controllable-agent-api
    env_file:
      - .env
    volumes:
      - ./app/config/agent.yaml:/app/app/config/agent.yaml:ro
      - agent-memory:/root/.agent-memory
    ports:
      - "8000:8000"
    command: python -m app.server
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  agent-memory:
    driver: local
